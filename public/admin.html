<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="favicon.png">
<title>bday.fm — Painel de Administração</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tailwind-prod.css">
<link rel="stylesheet" href="style.css">
<script src="users.js"></script>
<script src="auth.js"></script>
<script>
  // Guard: só a conta administrativa entra aqui. Roda o quanto antes.
  (function(){
    var s = authGetSession();
    if (!s || (s.slug !== 'admin' && s.role !== 'ADMIN')) { window.location.replace('login.html?next=admin.html'); }
  })();
</script>
<script src="icons.js"></script>
<script src="script.js"></script>
<style>
  /* ---- Tema do painel (identidade do site novo + modo escuro) ---- */
  :root{
    --adm-bg:#F8FAFC; --adm-card:#ffffff; --adm-line:#EEF0F6; --adm-ink:#0F172A;
    --adm-gray:#64748B; --adm-soft:#F1F5F9; --adm-side:#ffffff;
  }
  body.dark{
    --adm-bg:#0B1120; --adm-card:#101A2E; --adm-line:#1E293B; --adm-ink:#E2E8F0;
    --adm-gray:#94A3B8; --adm-soft:#16223A; --adm-side:#0D1526;
    color-scheme: dark;
  }
  body{ background:var(--adm-bg); color:var(--adm-ink); }
  .adm-card{ background:var(--adm-card); border:1px solid var(--adm-line); border-radius:18px; }
  .adm-muted{ color:var(--adm-gray); }
  .adm-soft{ background:var(--adm-soft); }
  .adm-line{ border-color:var(--adm-line) !important; }
  .adm-input{ background:var(--adm-card); border:1px solid var(--adm-line); color:var(--adm-ink); border-radius:12px; padding:8px 12px; font-size:13px; outline:none; width:100%; }
  .adm-input:focus{ border-color:#A78BFA; }
  /* Sidebar */
  #admSide{ background:var(--adm-side); border-right:1px solid var(--adm-line); }
  .side-link{ display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:12px; font-size:13.5px; font-weight:500; color:var(--adm-gray); cursor:pointer; transition:all .15s ease; white-space:nowrap; }
  .side-link:hover{ color:#7C3AED; background:rgba(124,58,237,.06); }
  .side-link.active{ color:#7C3AED; background:linear-gradient(90deg, rgba(124,58,237,.10), rgba(236,72,153,.08)); font-weight:700; }
  .side-link svg{ width:16px; height:16px; flex:none; }
  /* Badges de status */
  .badge{ display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:700; padding:2px 10px; border-radius:999px; }
  .badge-green{ background:#DCFCE7; color:#15803D; } body.dark .badge-green{ background:#14532D; color:#86EFAC; }
  .badge-amber{ background:#FEF3C7; color:#B45309; } body.dark .badge-amber{ background:#78350F; color:#FCD34D; }
  .badge-red{ background:#FEE2E2; color:#B91C1C; } body.dark .badge-red{ background:#7F1D1D; color:#FCA5A5; }
  .badge-purple{ background:#F3E8FF; color:#7C3AED; } body.dark .badge-purple{ background:#3B0764; color:#D8B4FE; }
  .badge-blue{ background:#DBEAFE; color:#1D4ED8; } body.dark .badge-blue{ background:#1E3A8A; color:#93C5FD; }
  /* Tabelas */
  .adm-table{ width:100%; font-size:13px; }
  .adm-table th{ text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--adm-gray); font-weight:700; padding:10px 12px; border-bottom:1px solid var(--adm-line); }
  .adm-table td{ padding:10px 12px; border-bottom:1px solid var(--adm-line); vertical-align:middle; }
  .adm-table tr:last-child td{ border-bottom:none; }
  .adm-table tbody tr:hover{ background:var(--adm-soft); }
  /* Botões de ação pequenos */
  .act-btn{ width:28px; height:28px; border-radius:8px; display:inline-flex; align-items:center; justify-content:center; color:var(--adm-gray); cursor:pointer; transition:all .12s; }
  .act-btn:hover{ background:var(--adm-soft); color:#7C3AED; }
  .act-btn.danger:hover{ color:#DC2626; }
  .act-btn svg{ width:14px; height:14px; }
  /* Abas internas */
  .adm-tab{ font-size:12.5px; font-weight:600; padding:6px 14px; border-radius:10px; color:var(--adm-gray); cursor:pointer; }
  .adm-tab.active{ background:linear-gradient(90deg,#7C3AED,#EC4899); color:#fff; }
  /* Toggle */
  .adm-toggle{ width:36px; height:20px; border-radius:999px; background:#CBD5E1; position:relative; cursor:pointer; transition:background .15s; flex:none; }
  .adm-toggle.on{ background:linear-gradient(90deg,#7C3AED,#EC4899); }
  .adm-toggle::after{ content:''; position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:#fff; transition:left .15s; }
  .adm-toggle.on::after{ left:18px; }
  .section-panel{ display:none; }
  .section-panel.active{ display:block; }
  @media (max-width: 900px){
    #admSide{ position:fixed; z-index:60; transform:translateX(-100%); transition:transform .2s; }
    #admSide.open{ transform:translateX(0); }
  }
</style>
</head>
<body class="min-h-screen">

<!-- Topbar -->
<header class="sticky top-0 z-50 border-b adm-line" style="background:var(--adm-card)">
  <div class="h-14 flex items-center gap-3 px-4 sm:px-6">
    <button id="admMenuBtn" class="act-btn md:hidden"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <a href="index.html" class="flex items-center gap-2">
      <img src="logo-full.png" alt="bday.fm" class="h-6 w-auto object-contain">
    </a>
    <span class="badge badge-purple">Painel Admin</span>
    <div class="relative flex-1 max-w-md mx-2 hidden sm:block">
      <input id="globalSearch" class="adm-input w-full" style="padding-left:32px" placeholder="Busca global: nome, e-mail, BDAY, ID, PIX, CPF, presente...">
      <span class="absolute left-2.5 top-1/2 -translate-y-1/2 adm-muted"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="w-4 h-4"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
      <div id="globalSearchResults" class="hidden absolute top-full left-0 right-0 mt-1 adm-card shadow-xl z-[80] max-h-96 overflow-y-auto p-1.5"></div>
    </div>
    <div class="ml-auto flex items-center gap-2 text-sm">
      <a href="feed.html?enter=admin" title="Ver o site logado como admin (saldo ilimitado para testes; fica logado ao clicar nas outras páginas)" class="adm-muted hover:text-purple-600 text-[13px] font-semibold hidden sm:block">Ver site</a>
      <span class="adm-muted hidden sm:block">·</span>
      <span class="text-[13px] font-semibold adm-muted hidden sm:block">admin@bday.fm</span>
      <div class="w-8 h-8 rounded-full grad-bg text-white flex items-center justify-center text-xs font-bold">A</div>
    </div>
  </div>
</header>

<div class="flex">
  <!-- Sidebar -->
  <aside id="admSide" class="w-56 shrink-0 h-[calc(100vh-56px)] sticky top-14 overflow-y-auto py-4 px-3">
    <nav id="admNav" class="space-y-0.5"></nav>
    <div class="border-t adm-line mt-4 pt-4 space-y-0.5">
      <div class="side-link" id="darkToggleLink"></div>
      <div class="side-link" id="logoutLink" style="color:#DC2626"></div>
    </div>
  </aside>

  <!-- Conteúdo -->
  <main class="flex-1 min-w-0 p-4 sm:p-6" id="admMain"></main>
</div>

// Gerada de forma determinística (PRNG com semente fixa), com datas relativas a agora,
// para o extrato ficar sempre "vivo" sem backend.
function mulberry32(a){ return function(){ a |= 0; a = a + 0x6D2B79F5 | 0; var t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }

const SAQUE_USERS = {}; // dados reais virão junto com o backend de saques
// Origem do saldo de um saque: quais BDAYs/presentes formaram o valor (determinístico por uid)
function origemDoSaldo(s){
  const rnd = mulberry32(4000 + s.uid);
  const catalogo = [['vale-compras', 'Vale Compras R$5', 5], ['balao', 'Balão de Festa', 8], ['biscoito', 'Biscoito da Sorte', 12], ['cafe', 'Vale Café', 6], ['bolo-andares', 'Bolo Surpresa 3 Andares', 32], ['coroa-festa', 'Coroa de Aniversariante', 25], ['kit-confete', 'Kit Confete', 10], ['flor', 'Buquê Pequeno', 45]];
  const enviadores = ['Maria', 'Lucas', 'Pedro', 'Rafael', 'Marina', 'João', 'Thainá', 'Carolina', 'Camila', 'Diego'];
  const bruto = +(s.valor / (1 - admGet('taxa', 20) / 100)).toFixed(2); // valor solicitado é líquido
  const nBdays = s.valor > 300 ? 2 : 1;
  const bdays = [];
  let restante = bruto;
  for (let b = 0; b < nBdays; b++) {
    const bd = ADMIN_BDAYS[Math.floor(rnd() * ADMIN_BDAYS.length)];
    const alvo = b === nBdays - 1 ? restante : +(restante * (0.4 + rnd() * 0.3)).toFixed(2);
    const gifts = [];
    let acc = 0;
    while (acc < alvo - 5 && gifts.length < 7) {
      const candidatos = catalogo.filter(c => c[2] <= alvo - acc);
      if (!candidatos.length) break;
      const [gi, gn, gv] = candidatos[Math.floor(rnd() * candidatos.length)];
      const quem = enviadores[Math.floor(rnd() * enviadores.length)];
      gifts.push({ quem, icone: gi, presente: gn, valor: gv });
      acc = +(acc + gv).toFixed(2);
    }
    const ajuste = +(alvo - acc).toFixed(2);
    if (Math.abs(ajuste) > 0.01) gifts.push({ quem: enviadores[Math.floor(rnd() * enviadores.length)], icone: 'presente', presente: 'Presente personalizado', valor: Math.abs(ajuste) });
    bdays.push({ bday: bd.titulo, id: bd.id, gifts, total: alvo });
    restante = +(restante - alvo).toFixed(2);
  }

// ---- Exportação (CSV / Excel / PDF) ----
function baixarArquivo(nome, mime, conteudo){
  try {
    const blob = new Blob(["\uFEFF" + conteudo], { type: mime });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = nome;
    document.body.appendChild(a); a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 500);
    showToast('Arquivo ' + nome + ' gerado.');
  } catch (e) { showToast('Não foi possível gerar o arquivo neste navegador.'); }
}
function exportRows(fmt, titulo, header, rows){
  const nome = titulo.toLowerCase().replace(/[^a-z0-9]+/g, '-');
  if (fmt === 'csv') {
    const csv = [header].concat(rows).map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(';')).join('\n');
    baixarArquivo(nome + '.csv', 'text/csv;charset=utf-8', csv);
  } else if (fmt === 'excel') {
    const tabela = '<table><tr>' + header.map(h => '<th>' + h + '</th>').join('') + '</tr>' +
      rows.map(r => '<tr>' + r.map(c => '<td>' + String(c) + '</td>').join('') + '</tr>').join('') + '</table>';
    baixarArquivo(nome + '.xls', 'application/vnd.ms-excel', '<html><head><meta charset="UTF-8"></head><body><h3>' + titulo + '</h3>' + tabela + '</body></html>');
  } else {
    const w = window.open('', '_blank');
    if (!w) { showToast('Libere pop-ups para exportar em PDF.'); return; }
    w.document.write('<html><head><title>' + titulo + '</title><style>body{font-family:Inter,system-ui,sans-serif;padding:24px} h2{color:#7C3AED} table{border-collapse:collapse;width:100%;font-size:12px} th,td{border:1px solid #ddd;padding:6px 8px;text-align:left} th{background:#F3E8FF}</style></head><body><h2>bday.fm — ' + titulo + '</h2><p>Gerado em ' + fmtData(Date.now()) + '</p><table><tr>' + header.map(h => '<th>' + h + '</th>').join('') + '</tr>' + rows.map(r => '<tr>' + r.map(c => '<td>' + String(c) + '</td>').join('') + '</tr>').join('') + '</table></body></html>');
    w.document.close(); w.focus(); w.print();
  }
  audit('Exportou relatório', titulo, fmt.toUpperCase());
}

// ---------- Gráficos SVG simples ----------
function lineChart(data, w, h, color){
  const max = Math.max(4, ...data.map(d => d[1]));
  const px = i => 40 + i * ((w - 60) / (data.length - 1));
  const py = v => (h - 30) - (v / max) * (h - 50);
  const pts = data.map((d, i) => `${px(i)},${py(d[1])}`).join(' ');
  const grid = [];
  for (let g = 0; g <= max; g++) grid.push(`<line x1="40" y1="${py(g)}" x2="${w - 20}" y2="${py(g)}" stroke="currentColor" stroke-opacity="0.07"/><text x="30" y="${py(g) + 4}" font-size="10" fill="currentColor" fill-opacity="0.45" text-anchor="end">${g}</text>`);
  const labels = data.map((d, i) => `<text x="${px(i)}" y="${h - 10}" font-size="10" fill="currentColor" fill-opacity="0.45" text-anchor="middle">${d[0]}</text>`).join('');
  const dots = data.map((d, i) => `<circle cx="${px(i)}" cy="${py(d[1])}" r="3.5" fill="${color}"/>`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" class="w-full" style="max-height:${h}px">
    ${grid.join('')}${labels}
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}</svg>`;
}
function donutChart(data, size){
  const total = data.reduce((s, d) => s + d[1], 0);
  const r = size / 2 - 12, cx = size / 2, cy = size / 2, circ = 2 * Math.PI * r;
  let off = 0;
  const segs = data.map(d => {
    const frac = d[1] / total;
    const seg = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d[2]}" stroke-width="20"
      stroke-dasharray="${(frac * circ).toFixed(1)} ${circ.toFixed(1)}" stroke-dashoffset="${(-off * circ).toFixed(1)}" transform="rotate(-90 ${cx} ${cy})"/>`;
    off += frac;
    return seg;
  }).join('');
  const legend = data.map(d => `<div class="flex items-center gap-2 text-xs"><span class="w-2.5 h-2.5 rounded-full" style="background:${d[2]}"></span><span class="adm-muted">${d[0]}</span><b class="ml-auto">${d[1]}%</b></div>`).join('');
  return `<div class="flex items-center gap-6 flex-wrap"><svg viewBox="0 0 ${size} ${size}" style="width:${size * 0.75}px">${segs}</svg><div class="space-y-1.5 min-w-[150px] flex-1">${legend}</div></div>`;
}

  lista.forEach(g => { if (!g.icone) g.icone = EMOJI_TO_ICON[g.emoji] || 'presente'; });

}

function giftDuplicar(id){
  const list = getGifts(); const g = list.find(x => x.id === id); if (!g) return;
  const novo = { ...g, id: Math.max(...list.map(x => x.id)) + 1, name: g.name + ' (cópia)', status: 'Rascunho', vendidos: 0, receita: 0, receberam: 0, enviaram: 0, ordem: list.length + 1,
    criado: fmtData(Date.now()), editado: fmtData(Date.now()), responsavel: 'admin@bday.fm',
    historico: [{ quando: fmtData(Date.now()), quem: 'admin@bday.fm', oque: 'Duplicado a partir de "' + g.name + '"' }] };
  list.push(novo); saveGifts(list);
  audit('Duplicou presente', g.name, 'Nova cópia em rascunho');
  showToast('Presente duplicado como rascunho.'); goSection('presentes');
}
function giftArquivar(id){
  const list = getGifts(); const g = list.find(x => x.id === id); if (!g) return;
  const novoStatus = g.status === 'Arquivado' ? 'Ativo' : 'Arquivado';
  g.status = novoStatus; g.editado = fmtData(Date.now());
  g.historico.unshift({ quando: fmtData(Date.now()), quem: 'admin@bday.fm', oque: novoStatus === 'Arquivado' ? 'Arquivado' : 'Reativado' });
  saveGifts(list);
  audit(novoStatus === 'Arquivado' ? 'Arquivou presente' : 'Reativou presente', g.name, '');
  showToast(g.name + (novoStatus === 'Arquivado' ? ' arquivado.' : ' reativado.')); goSection('presentes');
}
function giftExcluir(id){
  const list = getGifts(); const g = list.find(x => x.id === id); if (!g) return;
  saveGifts(list.filter(x => x.id !== id));
  audit('Excluiu presente', g.name, 'Remoção definitiva do catálogo');
  showToast(g.name + ' excluído.'); goSection('presentes');
}

function giftModalSave(id){
  const list = getGifts();
  const v = campo => document.getElementById(campo).value;
  const nome = (typeof bdaySanitize === 'function' ? bdaySanitize(v('gfNome')) : v('gfNome').trim());
  const preco = parseFloat(v('gfPreco'));
  if (!nome) { showToast('Dê um nome ao presente.'); return; }
  if (isNaN(preco) || preco <= 0) { showToast('Informe um valor válido.'); return; }
  const dados = { name: nome, icone: v('gfIcone') || 'presente', imagem: v('gfImg').trim() || null, categoria: v('gfCat'),
    desc: (typeof bdaySanitize === 'function' ? bdaySanitize(v('gfDesc')) : v('gfDesc').trim()), price: preco,
    publico: v('gfPublico'), status: v('gfStatus'), ordem: parseInt(v('gfOrdem'), 10) || 999 };
  if (id === null) {
    const novo = { ...dados, id: list.length ? Math.max(...list.map(x => x.id)) + 1 : 1, vendidos: 0, receita: 0, receberam: 0, enviaram: 0,
      criado: fmtData(Date.now()), editado: fmtData(Date.now()), responsavel: 'admin@bday.fm',
      historico: [{ quando: fmtData(Date.now()), quem: 'admin@bday.fm', oque: 'Presente criado' }] };
    list.push(novo);
    audit('Criou presente', nome, fmtBRL(preco) + ' · ' + dados.status);
  } else {
    const g = list.find(x => x.id === id);
    const mudancas = [];
    if (g.name !== dados.name) mudancas.push('nome: "' + g.name + '" → "' + dados.name + '"');
    if (g.price !== dados.price) mudancas.push('valor: ' + fmtBRL(g.price) + ' → ' + fmtBRL(dados.price));
    if (g.status !== dados.status) mudancas.push('status: ' + g.status + ' → ' + dados.status);
    if (g.publico !== dados.publico) mudancas.push('público: ' + g.publico + ' → ' + dados.publico);
    if (g.categoria !== dados.categoria) mudancas.push('categoria: ' + g.categoria + ' → ' + dados.categoria);
    if (g.ordem !== dados.ordem) mudancas.push('ordem: #' + g.ordem + ' → #' + dados.ordem);
    Object.assign(g, dados);
    g.editado = fmtData(Date.now()); g.responsavel = 'admin@bday.fm';
    const resumo = mudancas.length ? mudancas.join(' · ') : 'Ficha revisada sem mudanças de campo';
    g.historico.unshift({ quando: fmtData(Date.now()), quem: 'admin@bday.fm', oque: resumo });
    audit('Editou presente', nome, resumo);
  }
  saveGifts(list);
  const m = document.getElementById('giftModal'); if (m) m.remove();
  showToast('Presente salvo.'); goSection('presentes');
}

let relTab = 'geral';

function relTotais(){
  const entradas = LEDGER.filter(l => l.dir === 'in');
  const presentes = LEDGER.filter(l => l.tipo === 'Presente');
  const taxas = LEDGER.filter(l => l.tipo === 'Taxa');
  const saques = LEDGER.filter(l => l.tipo === 'Saque');
  const movimentado = presentes.reduce((t, l) => t + l.valor, 0);
  const comissao = taxas.reduce((t, l) => t + l.valor, 0);
  const sacado = saques.reduce((t, l) => t + l.valor, 0);
  return { entradas, presentes, taxas, saques, movimentado, comissao, sacado };
}

function supTab(elm){
  document.querySelectorAll('[data-sup-tab]').forEach(t => t.classList.remove('active'));
  elm.classList.add('active');
  const id = elm.getAttribute('data-sup-tab');
  document.querySelectorAll('[data-sup-panel]').forEach(p => p.classList.toggle('hidden', p.getAttribute('data-sup-panel') !== id));
}
function renderFrases(){
  const frases = admGet('frases', []);
  const list = document.getElementById('frasesList');
  if (!list) return;
  list.innerHTML = `<table class="adm-table"><thead><tr><th>Mensagem</th><th style="width:70px">Ativo</th><th style="width:70px">Ações</th></tr></thead><tbody>` +
    frases.map((f, i) => `<tr>
      <td class="font-semibold">${f.txt}</td>
      <td><span class="adm-toggle ${f.on ? 'on' : ''}" onclick="toggleFrase(${i})"></span></td>
      <td><span class="act-btn danger" onclick="delFrase(${i})">${AI.trash}</span></td>
    </tr>`).join('') + '</tbody></table>';
  const prev = document.getElementById('frasePreview');
  if (prev) prev.textContent = (frases.find(f => f.on) || { txt: '(nenhuma frase ativa)' }).txt;
}
function addFrase(){
  const input = document.getElementById('novaFrase');
  const txt = (typeof bdaySanitize === 'function' ? bdaySanitize(input.value) : input.value.trim());
  if (!txt) { showToast('Digite a mensagem do balão.'); return; }
  const frases = admGet('frases', []); frases.push({ txt, on: true }); admSet('frases', frases);
  input.value = ''; renderFrases(); showToast('Frase adicionada.');
}
function toggleFrase(i){ const f = admGet('frases', []); f[i].on = !f[i].on; admSet('frases', f); renderFrases(); }
function delFrase(i){ const f = admGet('frases', []); f.splice(i, 1); admSet('frases', f); renderFrases(); showToast('Frase removida.'); }

// ==================== MOVIMENTAÇÃO DA CONTA (extrato completo) ====================
let extFiltros = { periodo: '30', tipo: '', usuario: '', status: '', ini: '', fim: '' };
function setExtFiltro(campo, valor){ extFiltros[campo] = valor; goSection('extrato'); }

function filtrarLedger(){
  const agora = Date.now();
  return LEDGER.filter(l => {
    if (extFiltros.periodo === 'hoje') {
      if (new Date(l.ms).toDateString() !== new Date().toDateString()) return false;
    } else if (extFiltros.periodo === '7') {
      if (l.ms < agora - 7 * 86400000) return false;
    } else if (extFiltros.periodo === '30') {
      if (l.ms < agora - 30 * 86400000) return false;
    } else if (extFiltros.periodo === 'custom') {
      if (extFiltros.ini && l.ms < new Date(extFiltros.ini + 'T00:00').getTime()) return false;
      if (extFiltros.fim && l.ms > new Date(extFiltros.fim + 'T23:59').getTime()) return false;
    }
    if (extFiltros.tipo && l.tipo !== extFiltros.tipo) return false;
    if (extFiltros.status && l.status !== extFiltros.status) return false;
    if (extFiltros.usuario && !(l.usuario + ' ' + l.origem).toLowerCase().includes(extFiltros.usuario.toLowerCase())) return false;
    return true;
  });
}

R.extrato = () => {
  const rows = filtrarLedger();
  const entradas = rows.filter(l => l.dir === 'in').reduce((t, l) => t + l.valor, 0);
  const saidas = rows.filter(l => l.dir === 'out').reduce((t, l) => t + l.valor, 0);
  const tipos = ['Presente', 'Taxa', 'Saque', 'Reembolso', 'Estorno', 'Bonificação', 'Crédito', 'Débito'];
  const totalPorTipo = tipos.map(t => [t, LEDGER.filter(l => l.tipo === t).reduce((s2, l) => s2 + l.valor, 0), LEDGER.filter(l => l.tipo === t).length]);
  exportarAtual = f => exportRows(f, 'Movimentação da Conta', ['ID', 'Data', 'Tipo', 'Entrada/Saída', 'Origem', 'Usuário', 'BDAY', 'Presente', 'Valor', 'Taxa', 'Saldo após', 'Status'],
    rows.map(l => [l.id, fmtData(l.ms), l.tipo, l.dir === 'in' ? 'Entrada' : 'Saída', l.origem, l.usuario, l.bday, l.presente, fmtBRL(l.valor), fmtBRL(l.taxa), fmtBRL(l.saldoApos), l.status]));
  return `
  <div class="flex items-center justify-between flex-wrap gap-3 mb-1">
    <h1 class="text-xl font-extrabold">Movimentação da Conta</h1>
    ${exportBar()}
  </div>
  <p class="text-xs adm-muted mb-4">Extrato completo da plataforma — cada linha rastreia usuário, BDAY e presente de origem.</p>

  <div class="grid sm:grid-cols-3 gap-4 mb-4">
    <div class="adm-card p-4"><div class="text-xs adm-muted font-semibold">⬆ Entradas no período</div><div class="text-xl font-extrabold mt-1 text-green-600">+ ${fmtBRL(entradas)}</div></div>
    <div class="adm-card p-4"><div class="text-xs adm-muted font-semibold">⬇ Saídas no período</div><div class="text-xl font-extrabold mt-1 text-red-500">− ${fmtBRL(saidas)}</div></div>
    <div class="adm-card p-4"><div class="text-xs adm-muted font-semibold">Resultado do período</div><div class="text-xl font-extrabold mt-1">${fmtBRL(entradas - saidas)}</div></div>
  </div>

  <div class="adm-card p-3 mb-4">
    <div class="text-[11px] font-bold adm-muted mb-2">HISTÓRICO FINANCEIRO — TOTAIS POR TIPO (30 dias) · clique para filtrar</div>
    <div class="flex flex-wrap gap-1.5">
      <span class="adm-tab ${extFiltros.tipo === '' ? 'active' : ''}" onclick="setExtFiltro('tipo', '')">Tudo</span>
      ${totalPorTipo.map(t => `<span class="adm-tab ${extFiltros.tipo === t[0] ? 'active' : ''}" onclick="setExtFiltro('tipo', '${t[0]}')">${t[0]} <b>(${t[2]})</b> · ${fmtBRL(t[1])}</span>`).join('')}
    </div>
  </div>

  <div class="adm-card p-3 mb-4 flex flex-wrap items-end gap-2">
    <div>
      <div class="text-[11px] font-bold adm-muted mb-1">Período</div>
      <div class="flex gap-1">${[['hoje', 'Hoje'], ['7', '7 dias'], ['30', '30 dias'], ['tudo', 'Tudo'], ['custom', 'Personalizado']].map(p => `<span class="adm-tab ${extFiltros.periodo === p[0] ? 'active' : ''}" onclick="setExtFiltro('periodo', '${p[0]}')">${p[1]}</span>`).join('')}</div>
    </div>
    ${extFiltros.periodo === 'custom' ? `
    <label class="block"><span class="text-[11px] font-bold adm-muted">De</span><input type="date" class="adm-input mt-1" value="${extFiltros.ini}" onchange="setExtFiltro('ini', this.value)"></label>
    <label class="block"><span class="text-[11px] font-bold adm-muted">Até</span><input type="date" class="adm-input mt-1" value="${extFiltros.fim}" onchange="setExtFiltro('fim', this.value)"></label>` : ''}
    <label class="block flex-1 min-w-[160px]"><span class="text-[11px] font-bold adm-muted">Usuário / origem</span><input class="adm-input mt-1" value="${extFiltros.usuario}" placeholder="@usuario ou texto" onchange="setExtFiltro('usuario', this.value)"></label>
    <label class="block"><span class="text-[11px] font-bold adm-muted">Status</span>
      <select class="adm-input mt-1" onchange="setExtFiltro('status', this.value)">
        <option value="">Todos</option><option ${extFiltros.status === 'Concluída' ? 'selected' : ''}>Concluída</option><option ${extFiltros.status === 'Pendente' ? 'selected' : ''}>Pendente</option>
      </select></label>
  </div>

  <div class="adm-card overflow-x-auto">
    <table class="adm-table">
      <thead><tr><th>Data</th><th>Tipo</th><th>E/S</th><th>Origem</th><th>Usuário</th><th>BDAY</th><th>Presente</th><th>Valor</th><th>Taxa</th><th>Saldo após</th><th>Status</th></tr></thead>
      <tbody>
        ${rows.slice(0, 60).map(l => `
        <tr>
          <td class="adm-muted whitespace-nowrap text-[11px]">${fmtData(l.ms)}</td>
          <td><span class="badge ${l.tipo === 'Presente' ? 'badge-purple' : l.tipo === 'Taxa' ? 'badge-blue' : l.tipo === 'Saque' ? 'badge-amber' : l.dir === 'in' ? 'badge-green' : 'badge-red'}">${l.tipo}</span></td>
          <td class="font-bold ${l.dir === 'in' ? 'text-green-600' : 'text-red-500'}">${l.dir === 'in' ? '⬆' : '⬇'}</td>
          <td class="adm-muted max-w-[200px] truncate" title="${l.origem}">${l.origem}</td>
          <td class="text-purple-500 font-semibold whitespace-nowrap">${l.usuario}</td>
          <td class="adm-muted max-w-[140px] truncate">${l.bday}</td>
          <td class="adm-muted whitespace-nowrap">${l.presenteIcone ? `<span class="inline-flex items-center gap-1.5">${giftIconSvg(l.presenteIcone, 'w-3.5 h-3.5 text-purple-500 shrink-0')} ${l.presente}</span>` : l.presente}</td>
          <td class="font-bold whitespace-nowrap ${l.dir === 'in' ? 'text-green-600' : 'text-red-500'}">${l.dir === 'in' ? '+' : '−'} ${fmtBRL(l.valor)}</td>
          <td class="adm-muted whitespace-nowrap">${l.taxa ? fmtBRL(l.taxa) : '—'}</td>
          <td class="whitespace-nowrap font-semibold">${fmtBRL(l.saldoApos)}</td>
          <td><span class="badge ${l.status === 'Concluída' ? 'badge-green' : 'badge-amber'}">${l.status}</span></td>
        </tr>`).join('') || '<tr><td colspan="11" class="text-center adm-muted py-6">Nenhuma movimentação neste filtro.</td></tr>'}
      </tbody>
    </table>
    ${rows.length > 60 ? `<div class="text-center py-2 text-[11px] adm-muted">Mostrando 60 de ${rows.length} — use os filtros ou exporte o relatório completo.</div>` : ''}
  </div>`;
};

// ==================== BUSCA GLOBAL ====================
function buscaGlobal(q){
  q = q.toLowerCase();
  const hits = [];
  ADMIN_USERS.forEach(u => {
    if ((u.name + ' ' + u.email + ' @' + u.handle).toLowerCase().includes(q))
      hits.push({ grupo: 'Usuários', titulo: u.name, sub: '@' + u.handle + ' · ' + u.email, acao: () => { goSection('usuarios'); setTimeout(() => { const i = document.getElementById('userSearch'); if (i) { i.value = u.handle; renderUserRows(); } }, 50); } });
  });
  Object.entries(SAQUE_USERS).forEach(([key, u]) => {
    if ((u.nome + ' ' + u.email + ' ' + u.cpf + ' ' + u.pix).toLowerCase().includes(q)) {
      const sq = getSaques().find(x => x.user === key);
      if (sq) hits.push({ grupo: 'Saques (PIX/CPF)', titulo: u.nome + ' — ' + fmtBRL(sq.valor), sub: 'PIX ' + u.pix + ' · CPF ' + u.cpf, acao: () => openSaqueDetail(sq.uid) });
    }
  });
  ADMIN_BDAYS.forEach(b => {
    if ((b.id + ' ' + b.titulo + ' ' + b.dono + ' ' + b.categoria).toLowerCase().includes(q))
      hits.push({ grupo: 'BDAYs', titulo: b.titulo, sub: b.id + ' · ' + b.dono + ' · ' + fmtBRL(b.arrecadado) + ' arrecadados', acao: () => { relTab = 'celebracoes'; goSection('relatorios'); } });
  });
  getGifts().forEach(g => {
    if (g.name.toLowerCase().includes(q))
      hits.push({ grupo: 'Presentes', icone: g.icone, titulo: g.name, sub: fmtBRL(g.price) + ' · ' + g.vendidos + ' vendidos · ' + g.status, acao: () => giftModalOpen(g.id) });
  });
  LEDGER.forEach(l => {
    if (l.id.toLowerCase() === q)
      hits.push({ grupo: 'Movimentações', titulo: l.id + ' — ' + l.tipo + ' ' + fmtBRL(l.valor), sub: l.origem, acao: () => { extFiltros = { periodo: 'tudo', tipo: '', usuario: l.usuario.replace('@', ''), status: '', ini: '', fim: '' }; goSection('extrato'); } });
  });
  return hits.slice(0, 12);
}
(function initBuscaGlobal(){
  const input = document.getElementById('globalSearch');
  const box = document.getElementById('globalSearchResults');
  if (!input) return;
  window.__gsGo = (idx) => { const h = window.__gsHits && window.__gsHits[idx]; if (h) { box.classList.add('hidden'); input.value = ''; h.acao(); } };
  input.addEventListener('input', () => {
    const q = input.value.trim();
    if (q.length < 2) { box.classList.add('hidden'); return; }
    const hits = buscaGlobal(q);
    window.__gsHits = hits;
    let grupoAtual = '';
    box.innerHTML = hits.length ? hits.map((h, i) => {
      const cab = h.grupo !== grupoAtual ? `<div class="text-[10px] font-bold adm-muted uppercase tracking-wide px-2 pt-2">${h.grupo}</div>` : '';
      grupoAtual = h.grupo;
      return cab + `<div class="px-2 py-1.5 rounded-lg hover:bg-purple-50 cursor-pointer" onclick="__gsGo(${i})" style="transition:background .1s"><div class="text-sm font-semibold flex items-center gap-1.5">${h.icone ? giftIconSvg(h.icone, 'w-3.5 h-3.5 text-purple-500 shrink-0') : ''}${h.titulo}</div><div class="text-[11px] adm-muted">${h.sub}</div></div>`;
    }).join('') : '<div class="text-xs adm-muted text-center py-3">Nada encontrado para "' + q.replace(/</g, '') + '"</div>';
    box.classList.remove('hidden');
  });
  document.addEventListener('click', e => { if (!box.contains(e.target) && e.target !== input) box.classList.add('hidden'); });
})();
